---
id: CHEBI:521903
name: Dutasteride
description: >-
  Dual 5-alpha reductase inhibitor — blocks both Type I and Type II
  isoforms of 5-AR, compared to finasteride which selectively inhibits
  only Type II. This results in more complete DHT suppression:
  ~90–95% reduction in serum DHT vs ~70% with finasteride, and
  ~97% reduction in scalp DHT. Approved for BPH (Avodart 0.5mg);
  used off-label for AGA at 0.5mg daily or 0.5mg weekly (evidence for
  both dosing schedules). Stronger effect on scalp DHT makes it
  attractive for treatment-resistant AGA.
