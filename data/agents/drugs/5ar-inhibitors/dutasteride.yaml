fda_approval_status: approved_for_bph_off_label_aga
drug_class: Dual 5-alpha reductase inhibitor (Type I + II)
notes: >-
  More potent DHT suppression than finasteride. Not FDA-approved for
  AGA but widely used off-label. Some evidence it is more effective
  than finasteride for severe or treatment-resistant AGA. Side effect
  profile similar to finasteride (sexual side effects ~5–9%). Long
  half-life (~5 weeks) allows less frequent dosing. Combination with
  topical minoxidil is common clinical practice.
