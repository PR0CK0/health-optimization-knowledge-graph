id: healthkg:agent/mesterolone
name: Proviron (Mesterolone)
description: >
  Oral DHT-derived androgen with minimal anabolic activity but clinically significant androgenic
  and anti-estrogenic properties. Displaces testosterone from SHBG, raising free testosterone.
  Competes with oestradiol at the aromatase enzyme. Not significantly suppressive at typical doses.
  Licensed in many countries for male hypogonadism and infertility (improves sperm quality).
  Unique among oral AAS in being non-17-alpha-alkylated, so hepatotoxicity is minimal.
aliases:
  - Mesterolone
  - Proviron
xrefs:
