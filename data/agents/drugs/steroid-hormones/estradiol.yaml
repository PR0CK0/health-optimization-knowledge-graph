paradigms: [hair_health, hormonal_health, skin_health]
cas_number: "50-28-2"
molecular_formula: C18H24O2
drugbank_id: DB00783
atc_code: G03CA03
fda_approval_status: approved
drug_class: Estrogen / sex hormone
notes: >-
  In the context of AGA, estradiol's benefit is primarily mediated
  through testosterone suppression rather than direct follicular
  estrogenic effects (though estrogen receptors are expressed in
  follicles). Typically combined with an anti-androgen (spironolactone,
  bicalutamide, or cyproterone acetate) in feminizing HRT for maximum
  androgen suppression. Estradiol monotherapy at sufficient doses
  (e.g. high-dose patches or injections) can suppress testosterone
  to female range (<50 ng/dL) without anti-androgens in some individuals.
  Not used for AGA in cisgender men due to feminizing side effects.
