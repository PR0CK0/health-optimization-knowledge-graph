# Drug entry — Estradiol (17β-Estradiol)
---
id: CHEBI:16469
name: Estradiol
description: >-
  17β-Estradiol — the primary endogenous estrogen. Used exogenously in
  feminizing hormone therapy (HRT) for transgender women and in
  post-menopausal estrogen replacement. Suppresses the
  hypothalamic-pituitary-gonadal (HPG) axis via negative feedback,
  substantially reducing LH/FSH → testosterone production drops to
  female physiological range. This androgen suppression halts and
  often reverses androgenic alopecia (AGA) in people with testes.
  Available as oral tablets, transdermal patches/gel, subcutaneous
  pellets, and intramuscular/subcutaneous injections (estradiol
  valerate, cypionate, enanthate).
aliases:
  - 17β-Estradiol
  - Oestradiol
