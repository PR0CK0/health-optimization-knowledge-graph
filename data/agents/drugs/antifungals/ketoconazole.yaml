# Drug entry — Ketoconazole
# Validate: make validate-data FILE=data/agents/drugs/ketoconazole.yaml CLASS=Drug
---
id: CHEBI:47519
name: Ketoconazole
description: >-
  Imidazole antifungal with significant anti-androgenic properties. Used
  topically as a 1–2% shampoo for androgenic alopecia (AGA), seborrheic
  dermatitis, and dandruff. Exerts effects via antifungal action (reducing
  Malassezia colonisation and scalp inflammation) and direct androgen receptor
  antagonism / inhibition of scalp DHT synthesis. Evidence supports use as
  an adjunct to minoxidil and finasteride in AGA treatment.
aliases:
  - Nizoral
  - Ketoconazol
  - 1-[4-[4-[[(2R,4S)-2-(2,4-dichlorophenyl)-2-(imidazol-1-ylmethyl)-1,3-dioxolan-4-yl]methoxy]phenyl]piperazin-1-yl]ethanone
xrefs:
  - DrugBank:DB01026
  - PubChem:456201
  - CHEBI:47519
  - RxNorm:6054
paradigms:
  - hair_health
  - skin_health

cas_number: 65277-42-1
molecular_formula: C26H28Cl2N4O4

mechanisms_of_action:
  - Inhibits ergosterol synthesis in Malassezia fungi (antifungal effect)
  - Reduces scalp Malassezia colonisation → reduces follicular inflammation
  - Weak androgen receptor antagonist
  - Inhibits cytochrome P450-dependent enzymes involved in androgen synthesis
  - May directly inhibit 5-alpha reductase at high concentrations

drugbank_id: DB01026
rxcui: "6054"
atc_code: D01AC08
fda_approval_status: approved
approved_indications:
  - Seborrheic dermatitis and dandruff — 1% OTC shampoo
  - Tinea versicolor, other fungal infections — 2% Rx shampoo/cream
off_label_uses:
  - Adjunct treatment for androgenic alopecia (2% shampoo 2–3×/week)
drug_class: Azole antifungal / androgen synthesis inhibitor
notes: >-
  Topical use is very well tolerated. The 2% shampoo is the form studied
  in AGA RCTs. Proposed mechanism in AGA is dual: anti-inflammatory (via
  Malassezia reduction) and weak anti-androgenic. Typically used 2–3 times
  weekly in combination protocols with minoxidil ± finasteride.
  Oral ketoconazole has significant hepatotoxicity risk and is not used
  for AGA.
administered_via:
  - healthkg:procedure/topical-application
