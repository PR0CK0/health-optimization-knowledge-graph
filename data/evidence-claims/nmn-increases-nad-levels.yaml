assertion:
  subject_agent: CHEBI:77518   # NMN
  predicate: increases
  object_outcome: healthkg:outcome/nad-levels
  dose_description: "250–500mg oral NMN daily"
  route: oral
  population: "Healthy middle-aged and older adults (40–65+); some evidence in younger subjects"
  mechanism_summary: >-
    NMN is a direct biosynthetic precursor to NAD+. After oral absorption, NMN
    is converted to NR then to NMN intracellularly, or absorbed intact via
    Slc12a8 transporter. NAMPT (rate-limiting enzyme in the NAD+ salvage
    pathway) activity declines with age, making precursor supplementation
    effective at restoring NAD+ pool. Elevated NAD+ activates sirtuins
    (SIRT1–7) and PARP enzymes — key regulators of mitochondrial biogenesis,
    DNA repair, and metabolic homeostasis.

evidence_lines:

