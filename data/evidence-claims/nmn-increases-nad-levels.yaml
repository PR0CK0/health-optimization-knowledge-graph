    notes: >-
      Crossover RCT, 250mg/day NMN. Whole-blood NAD+ increased ~38% vs
      placebo at 12 weeks. Also reported reduced fatigue and improved
      physical performance scores. First well-powered human NMN RCT with
      NAD+ endpoints confirmed by LC-MS/MS.

