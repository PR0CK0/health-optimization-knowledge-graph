      title: >-
        Chronic nicotinamide mononucleotide supplementation elevates blood
        nicotinamide adenine dinucleotide levels in healthy subjects and
        reduces fatigue in Japanese adults aged 40–60.
      authors: [Igarashi M, Nakagawa-Nagahama Y, Miura M, Kashiwabara K, Yaku K, Onuma Y, Hashimoto R, Ito T, Nakamura K, Fukamizu Y, Sato T, Sakurai T, Nakagawa T, Kadowaki T]
      journal: npj Aging
      year: 2022
      design: randomized_controlled_trial
      n_participants: 36
      duration_weeks: 12
      population_sex: male
      population_description: Japanese men aged 40–60
      blinding: double_blind
      risk_of_bias: moderate
      funding_source: industry_funded
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    percent_change: 38.0
