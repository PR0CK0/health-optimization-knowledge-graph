claim_status: preliminary

assertion:
  subject_agent: PubChem:9941957   # BPC-157
  predicate: mechanistically_supports
  object_outcome: healthkg:outcome/tissue-repair-rate
  dose_description: "Animal studies: 10–10,000 µg/kg injected or oral; human dose unknown — no established safe dose"
  route: subcutaneous_injection
  population: >-
    Animal models (rat, murine) for tendon, muscle, bone, gut repair.
    No completed human RCTs as of 2026. WADA-prohibited substance.
  mechanism_summary: >-
    BPC-157 (Body Protection Compound 157) is a 15-amino-acid gastric
    pentadecapeptide fragment of BPC. Proposed mechanisms include:
    (1) upregulation of VEGF and its receptor — promoting angiogenesis at
    wound sites; (2) activation of FAK-paxillin signalling → fibroblast
    and tendon cell migration; (3) modulation of the NO system
    (cytoprotective NO effects); (4) growth hormone receptor sensitisation.
    Animal data demonstrate accelerated tendon-to-bone healing, muscle
    repair, gut ulcer healing, and anastomosis repair. Human translation
    is unverified.

