# EvidenceClaim — Topical caffeine modestly supports hair density via cAMP pathway
---
id: healthkg:claim/caffeine-topical-supports-hair-density
paradigms: [hair_health]
tags: [caffeine, topical, hair-density, cAMP, DHT, ex-vivo]
curator: tyler
curation_date: "2026-02-26"
last_reviewed: "2026-02-26"
overall_grade: low
n_supporting_studies: 2
n_refuting_studies: 0
highest_study_design: randomized_controlled_trial
claim_status: preliminary

assertion:
  subject_agent: CHEBI:27732
  predicate: increases
  object_outcome: healthkg:outcome/hair-density
  dose_description: "0.2% caffeine in shampoo or 1–2% leave-on serum"
  mechanism_summary: >-
    Caffeine acts as a phosphodiesterase inhibitor, increasing intracellular
    cAMP in follicular keratinocytes. This counteracts the cAMP-lowering
    effect of DHT on follicle growth. Penetration is via transfollicular
    route. Evidence strongest in ex vivo and industry-funded trials.

evidence_lines:

  - study:
      pmid: "17214716"
      title: >-
        Effect of caffeine and testosterone on the proliferation of human
        hair follicles in vitro.
      authors: [Fischer TW, Hipler UC, Elsner P]
      journal: International Journal of Dermatology
      year: 2007
      design: ex_vivo
      risk_of_bias: moderate
    eco_evidence_type: ex_vivo_evidence
    direction: supports
    notes: >-
      Ex vivo human hair follicle organ culture: 0.001% caffeine
      counteracted DHT-induced suppression of follicle elongation and
      stimulated keratinocyte proliferation. Confirmed cAMP as the
      mechanistic pathway.

  - study:
      pmid: "21680797"
      title: >-
        Use of a caffeine shampoo for the treatment of male
        androgenetic alopecia.
      authors: [Bussoletti C, Mastropietro F, Tolaini MV, Celleno L]
      journal: Journal of Applied Cosmetology
      year: 2011
      design: controlled_trial
      n_participants: null
      blinding: placebo_controlled
      risk_of_bias: high
      funding_source: industry_funded
    eco_evidence_type: controlled_trial_evidence
    direction: supports
    notes: >-
      0.2% caffeine shampoo reduced hair loss and improved shaft elongation
      vs placebo at 6 months in men with AGA. Industry-sponsored (Alpecin).
      Limited independent replication available.
