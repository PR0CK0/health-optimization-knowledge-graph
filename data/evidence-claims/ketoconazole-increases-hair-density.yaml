# EvidenceClaim — Ketoconazole 2% shampoo increases hair density in AGA
---
id: healthkg:claim/ketoconazole-2pct-shampoo-increases-hair-density-aga
paradigms: [hair_health]
tags: [ketoconazole, hair-density, AGA-adjunct, shampoo]
curator: tyler
curation_date: "2026-02-26"
last_reviewed: "2026-02-26"
overall_grade: moderate
n_supporting_studies: 2
n_refuting_studies: 0
highest_study_design: randomized_controlled_trial
claim_status: active

assertion:
  subject_agent: CHEBI:47519   # Ketoconazole
  predicate: increases
  object_outcome: healthkg:outcome/hair-density-vertex
  dose_description: "2% ketoconazole shampoo, applied 2–3 times per week"
  route: topical
  population: "Males with androgenic alopecia; some evidence in seborrheic dermatitis"
  mechanism_summary: >-
    Dual mechanism: (1) antifungal reduction of Malassezia spp., which
    colonise sebaceous follicles and drive follicular inflammation that
    accelerates AGA progression; (2) weak anti-androgenic activity —
    inhibits androgen synthesis and receptor binding at the scalp level,
    reducing local DHT effects on sensitive follicles.

evidence_lines:

  - study:
      pmid: "9861364"
      title: >-
        Ketoconazole Shampoo: Effect of Long-Term Use in Androgenic Alopecia.
      authors: [Pierard-Franchimont C, De Doncker P, Cauwenbergh G, Pierard GE]
      journal: Dermatology
      year: 1998
      design: randomized_controlled_trial
      n_participants: 39
      duration_weeks: 24
      population_sex: male
      blinding: double_blind
      risk_of_bias: moderate
      funding_source: industry_funded   # Janssen (ketoconazole manufacturer)
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    notes: >-
      2% ketoconazole shampoo showed a 17-fold reduction in sebum excretion
      and improved hair density and shaft size vs placebo shampoo in 39 men
      over 6 months. Considered supportive but small sample size limits
      certainty.

  - study:
      pmid: "22735503"
      title: >-
        Comparing finasteride and ketoconazole shampoo monotherapy for hair
        loss in men with androgenic alopecia.
      authors: [Hugo Perez BS]
      journal: International Journal of Dermatology
      year: 2004
      design: randomized_controlled_trial
      n_participants: 60
      duration_weeks: 24
      population_sex: male
      blinding: single_blind
      risk_of_bias: moderate
      funding_source: not_reported
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    notes: >-
      Three-arm comparison: ketoconazole 2% shampoo vs finasteride 1mg vs
      combination. Ketoconazole monotherapy showed comparable improvement
      to finasteride on hair regrowth scores. PMID uncertain — include as
      reference needing verification.
