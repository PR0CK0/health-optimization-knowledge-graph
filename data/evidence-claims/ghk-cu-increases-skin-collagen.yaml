# EvidenceClaim — GHK-Cu increases dermal collagen synthesis
---
id: healthkg:claim/ghk-cu-increases-skin-collagen-density
paradigms: [skin_health]
tags: [GHK-Cu, copper-peptide, collagen, skin-aging, fibroblast]
curator: tyler
curation_date: "2026-02-26"
last_reviewed: "2026-02-26"
overall_grade: low
n_supporting_studies: 3
n_refuting_studies: 0
highest_study_design: controlled_trial
claim_status: preliminary

assertion:
  subject_agent: PubChem:73995   # GHK-Cu
  predicate: increases
  object_outcome: healthkg:outcome/skin-collagen-density
  dose_description: "Topical 1–2% GHK-Cu in cream/serum base, daily to twice-daily"
  route: topical
  population: "Adults with photoaged or aging skin; most human evidence from cosmetic trials without placebo control"
  mechanism_summary: >-
    GHK-Cu directly stimulates collagen I and III gene transcription in
    dermal fibroblasts. The copper ion is required for lysyl oxidase activity
    (crosslinking of newly synthesised collagen/elastin). GHK tripeptide
    activates TGF-β1 signalling independently of the copper, upregulates
    decorin (a collagenase inhibitor proteoglycan), and suppresses MMP-2/MMP-9.
    Net effect: increased collagen deposition and reduced degradation.

