# EvidenceClaim — Red/NIR light therapy increases hair density in AGA
---
id: healthkg:claim/rlt-increases-hair-density-aga
paradigms: [hair_health]
tags: [LLLT, PBM, red-light, hair-density, AGA, FDA-cleared]
