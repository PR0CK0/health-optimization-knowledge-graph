claim_status: active

assertion:
  subject_procedure: healthkg:procedure/red-light-therapy
  predicate: increases
  object_outcome: healthkg:outcome/hair-density-vertex
  dose_description: "655nm or 650nm laser/LED, 10–30 min sessions, 3×/week; FDA-cleared devices"
  population: "Males and females with androgenic alopecia (Norwood II–V / Ludwig I–II)"
  mechanism_summary: >-
    Photons at 630–670nm are absorbed by cytochrome c oxidase in follicular
    mitochondria → increased ATP → anagen-phase prolongation, improved
    follicular oxygenation, and anti-inflammatory effects. May also
    stimulate nitric oxide release → vasodilation and increased follicular
    blood flow.

