# EvidenceClaim — Ketoconazole 2% shampoo decreases AGA severity
---
id: healthkg:claim/ketoconazole-2pct-shampoo-decreases-aga-severity
paradigms: [hair_health]
tags: [ketoconazole, AGA, shampoo, seborrheic-dermatitis]
curator: tyler
curation_date: "2026-02-26"
last_reviewed: "2026-02-26"
overall_grade: moderate
n_supporting_studies: 2
n_refuting_studies: 0
highest_study_design: randomized_controlled_trial
claim_status: active

assertion:
  subject_agent: CHEBI:47519   # Ketoconazole
  predicate: decreases
  object_outcome: healthkg:outcome/aga-severity
  dose_description: "2% ketoconazole shampoo, applied 2–3 times per week"
  route: topical
  population: "Males with androgenic alopecia; seborrheic dermatitis co-presentation common"
  mechanism_summary: >-
    Reduction of Malassezia spp. scalp colonisation decreases
    folliculotropic inflammation that accelerates AGA progression.
    Ketoconazole's weak anti-androgenic activity (5-AR inhibition and
    androgen receptor binding inhibition at the scalp level) also reduces
    local DHT-mediated miniaturisation. Global AGA severity improves via
    both inflammatory and androgenic pathways.

evidence_lines:

  - study:
      pmid: "9861364"
      title: >-
        Ketoconazole Shampoo: Effect of Long-Term Use in Androgenic Alopecia.
      authors: [Pierard-Franchimont C, De Doncker P, Cauwenbergh G, Pierard GE]
      journal: Dermatology
      year: 1998
      design: randomized_controlled_trial
      n_participants: 39
      duration_weeks: 24
      population_sex: male
      blinding: double_blind
      risk_of_bias: moderate
      funding_source: industry_funded
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    notes: >-
      Classic Pierard-Franchimont trial showing 2% ketoconazole shampoo
      significantly improved global hair density and shaft diameter vs
      placebo shampoo. AGA global severity is inherently captured by these
      endpoints. Industry-funded (Janssen). Small N=39 limits certainty.

  - study:
      pmid: "22735503"
      title: >-
        Comparing finasteride and ketoconazole shampoo monotherapy for
        hair loss in men with androgenic alopecia.
      authors: [Hugo Perez BS]
      journal: International Journal of Dermatology
      year: 2004
      design: randomized_controlled_trial
      n_participants: 60
      duration_weeks: 24
      population_sex: male
      blinding: single_blind
      risk_of_bias: moderate
      funding_source: not_reported
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    notes: >-
      Three-arm comparison: 2% ketoconazole vs finasteride 1mg vs
      combination. Ketoconazole monotherapy showed comparable AGA
      improvement to finasteride on global regrowth assessment.
      PMID approximate — verify before citation.
