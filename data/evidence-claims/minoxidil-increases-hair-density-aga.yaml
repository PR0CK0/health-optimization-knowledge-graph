assertion:
  subject_agent: CHEBI:50870   # Minoxidil
  predicate: increases
  object_outcome: healthkg:outcome/hair-density-vertex
  dose_description: "5% topical solution or foam, applied once or twice daily to affected scalp"
  dose_mg: 50.0   # ~50mg/mL × 1mL application
  route: topical
  population: "Adult males with mild-to-moderate androgenic alopecia (Hamilton-Norwood II–V)"
  duration_of_use: "After 24–48 weeks of continuous use"
  mechanism_summary: >-
    Minoxidil sulfate (the active metabolite, formed by scalp SULT1A1) opens
    KATP channels in dermal papilla cells, increasing follicular perfusion and
    promoting anagen phase re-entry. May also directly stimulate keratinocyte
    proliferation via prostaglandin E2 upregulation.
  mechanism_go_terms:
    - GO:0006811   # ion transport
    - GO:0001942   # hair follicle development
    - GO:0001501   # skeletal system development (indirect — follicle cycling)
  target_anatomy:
    - UBERON:0002073   # hair follicle
    - UBERON:0000978   # scalp

evidence_lines:

