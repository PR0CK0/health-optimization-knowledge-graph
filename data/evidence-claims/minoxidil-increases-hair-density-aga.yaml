  - study:
      pmid: "2180995"
      doi: "10.1111/j.1365-2133.1990.tb08388.x"
      title: >-
        A randomized clinical trial of 5% topical minoxidil versus 2%
        topical minoxidil and placebo in the treatment of androgenetic alopecia
        in men.
      authors: [Olsen EA, Weiner MS, Amara IA, DeLong ER]
      journal: Journal of the American Academy of Dermatology
      year: 1990
      design: randomized_controlled_trial
      n_participants: 393
      n_completers: 335
      duration_weeks: 48
      population_description: >-
        Men aged 18–49 with active androgenetic alopecia (Hamilton-Norwood
        IIIv–V vertex).
      population_sex: male
      mean_age_years: 32.0
      intervention_description: >-
        5% minoxidil solution vs 2% minoxidil solution vs vehicle placebo,
        applied twice daily for 48 weeks.
      blinding: double_blind
      risk_of_bias: low
      funding_source: industry_funded   # Upjohn (now Pfizer)
      preprint: false
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    effect_size: 45.0
    effect_size_metric: percent_change
    percent_change: 45.0
    p_value: 0.001
    duration_of_effect: "At 48 weeks"
    notes: >-
      Landmark Upjohn-sponsored RCT. 5% showed ~45% increase in non-vellus
      hair count from baseline vs ~15% for 2% vs slight decrease for placebo.
      Hair count measured by target area hair count method. Industry funding
      is a limitation but results widely replicated.

  - study:
      pmid: "11392792"
      doi: "10.1067/mjd.2001.114896"
      title: >-
        Finasteride in the treatment of men with androgenetic alopecia.
        Finasteride Male Pattern Hair Loss Study Group.
      authors: [Kaufman KD, Olsen EA, Whiting D]
      journal: Journal of the American Academy of Dermatology
      year: 1998
      design: randomized_controlled_trial
      n_participants: 1553
      n_completers: 1215
      duration_weeks: 104
      population_description: >-
        Men 18–41 with mild-to-moderate AGA (Hamilton-Norwood IIIv–V vertex).
      population_sex: male
      mean_age_years: 26.2
      intervention_description: >-
        Finasteride 1mg oral daily vs placebo. Note: this study is included
        as a comparator RCT to establish the AGA context and relative effect
        sizes. Hair count at vertex target area via macrophotography.
      blinding: double_blind
      risk_of_bias: low
      funding_source: industry_funded   # Merck
      preprint: false
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    effect_size: 0.5
    effect_size_metric: cohens_d
    p_value: 0.001
    duration_of_effect: "At 2 years"
    notes: >-
      Included for comparison context. Finasteride showed mean increase of
      ~107 hairs at vertex vs placebo loss of ~75 hairs. Referenced here
      as the active comparator benchmark for hair growth interventions in
      AGA. Minoxidil 5% topical + finasteride 1mg oral is the standard
      combination regimen with additive effects.

