      authors: [Suchonwanit P, Thammarucha S, Leerunyakul K]
      journal: Journal of the European Academy of Dermatology and Venereology
      year: 2019
      design: systematic_review
      n_participants: null   # systematic review; pooled across studies
      population_description: "Males and females with AGA"
