# EvidenceClaim — Elevated DHT increases AGA severity (androgenic miniaturisation)
---
id: healthkg:claim/dht-increases-aga-severity
paradigms: [hair_health, hormonal_health]
tags: [dht, AGA, androgenic-alopecia, miniaturisation, causal-chain]
curator: tyler
curation_date: "2026-02-26"
last_reviewed: "2026-02-26"
overall_grade: high
n_supporting_studies: 3
n_refuting_studies: 0
highest_study_design: rct_indirect_via_intervention
claim_status: active

assertion:
  subject_outcome: healthkg:outcome/dht-serum
  predicate: increases
  object_outcome: healthkg:outcome/aga-severity
  mechanism_summary: >-
    DHT binds the androgen receptor (AR) in genetically susceptible
    follicular dermal papilla cells. AR activation shortens anagen
    phase, miniaturises follicles over successive cycles, and ultimately
    produces vellus hairs. The causal role of DHT is established by the
    natural experiment of 5-AR deficiency (no AGA despite normal T) and
    confirmed by 5-AR inhibitors halting/reversing AGA in proportion
    to their degree of DHT suppression.

evidence_lines:

  - study:
      pmid: "5061858"
      title: >-
        Male pseudohermaphroditism resulting from inherited 5-alpha-reductase
        deficiency.
      authors: [Imperato-McGinley J, Guerrero L, Gautier T, Peterson RE]
      journal: Science
      year: 1974
      design: natural_experiment
      risk_of_bias: low
    eco_evidence_type: natural_experiment_evidence
    direction: supports
    notes: >-
      Landmark natural experiment: individuals with inherited 5-AR
      deficiency have normal testosterone but undetectable DHT — and
      do not develop androgenetic alopecia despite male hormone levels.
      This constitutes near-causal evidence that DHT, not testosterone,
      is the proximate driver of AGA.

  - study:
      pmid: "9738759"
      title: >-
        Finasteride in the treatment of men with androgenetic alopecia.
        Finasteride Male Pattern Hair Loss Study Group.
      authors: [Kaufman KD, Olsen EA, Whiting D]
      journal: Journal of the American Academy of Dermatology
      year: 1998
      design: randomized_controlled_trial
      n_participants: 1553
      blinding: double_blind
      risk_of_bias: low
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    notes: >-
      ~70% serum DHT reduction with finasteride produced significant
      AGA stabilisation and partial reversal. Dose-response across
      multiple doses confirms DHT drives progression — greater DHT
      suppression correlates with better hair outcome.

  - study:
      pmid: "28677983"
      title: >-
        A randomized, active- and placebo-controlled study of dutasteride
        versus placebo and finasteride in androgenetic alopecia.
      authors: [Gubelin Harcha W, Barboza Martinez J, Tsai TF]
      journal: Journal of the American Academy of Dermatology
      year: 2014
      design: randomized_controlled_trial
      n_participants: 917
      blinding: double_blind
      risk_of_bias: low
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    notes: >-
      Dutasteride (~97% DHT suppression) > finasteride (~70%) for hair
      density improvement, with magnitude proportional to degree of DHT
      suppression. Confirms the quantitative DHT → AGA dose-response
      relationship.
