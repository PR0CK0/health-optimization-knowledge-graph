    eco_evidence_type: preclinical_evidence
    direction: supports
    notes: >-
      Preclinical kinetics of dutasteride dual 5-AR inhibition:
      Type I Ki ~6nM, Type II Ki ~7nM. Near-complete DHT suppression
      achievable across both isoforms. Establishes mechanistic basis.
