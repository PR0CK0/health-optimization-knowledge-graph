assertion:
  subject_agent: CHEBI:521903
  predicate: decreases
  object_outcome: healthkg:outcome/dht-serum
  dose_description: "0.5mg oral daily"
  mechanism_summary: >-
    Dual 5-AR inhibition (Type I + II isoforms) produces ~94–97% serum
    DHT suppression, greater than finasteride's ~70%. Scalp skin DHT
    reduced by ~97%. Long half-life (~5 weeks) enables sustained suppression.

evidence_lines:

  - study:
