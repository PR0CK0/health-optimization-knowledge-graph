      title: >-
        Marked suppression of dihydrotestosterone in men with benign
        prostatic hyperplasia by dutasteride, a dual 5alpha-reductase
        inhibitor.
      authors: [Clark RV, Hermann DJ, Cunningham GR, Wilson TH, Morrill BB, Hobbs S]
      journal: Journal of Clinical Endocrinology and Metabolism
      year: 2004
      design: randomized_controlled_trial
      n_participants: 399
      duration_weeks: 104
      blinding: double_blind
      risk_of_bias: low
      funding_source: industry_funded
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    percent_change: -94.7
    notes: >-
      Dutasteride 0.5mg/day produced 94.7% median serum DHT suppression
      at 2 weeks, maintained at 96.4% at 2 years. Scalp skin DHT reduced
      ~97% at steady state. Establishes pharmacodynamic benchmark.

  - study:
      pmid: "9815366"
      title: >-
