assertion:
  subject_agent: PubChem:73995   # GHK-Cu
  predicate: increases
  object_outcome: healthkg:outcome/hair-density-vertex
  dose_description: "Topical application; concentration varies (0.01–2% in formulations)"
  route: topical
  population: "Adults with AGA or thinning hair; evidence primarily in vitro and murine"
  mechanism_summary: >-
    GHK-Cu stimulates fibroblast proliferation and upregulates keratinocyte
    growth factor (KGF/FGF-7), which is a critical paracrine signal from
    dermal papilla cells to follicular keratinocytes for anagen induction.
    Additionally GHK-Cu activates follistatin (an activin antagonist), reduces
    scalp DHT via 5-AR modulation in vitro, and may enlarge follicle size by
    stimulating follicular blood supply and ECM remodelling around the
    dermal papilla.

