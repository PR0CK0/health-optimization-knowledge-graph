      year: 2000
      design: cohort
      n_participants: 69
      duration_weeks: 52
      population_sex: mixed
      population_description: >-
        Transgender women (MTF, n=38) on estradiol + anti-androgen;
        transgender men (FTM, n=31) on testosterone.
      blinding: open_label
      risk_of_bias: moderate
      funding_source: not_reported
    eco_evidence_type: cohort_study_evidence
    direction: supports
    notes: >-
      Classic Giltay & Gooren paper. MTF group on feminizing HRT showed
      significant reduction in sebum production and stabilisation of
      AGA progression at 12 months. No placebo arm (unethical in this
      population). Demonstrates androgen deprivation via estrogen-based
      HRT directly impacts scalp/sebaceous outcomes consistent with
      DHT pathway suppression.

