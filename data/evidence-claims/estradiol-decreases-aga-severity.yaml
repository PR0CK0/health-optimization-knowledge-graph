assertion:
  subject_agent: CHEBI:16469   # Estradiol
  predicate: decreases
  object_outcome: healthkg:outcome/aga-severity
  dose_description: >-
    Feminizing HRT doses: oral estradiol 2–8mg/day, or transdermal
    100–200µg/day patch, or injectable estradiol valerate/cypionate
    5–20mg IM/SC every 1–2 weeks. Often combined with anti-androgen
    (spironolactone 100–200mg/day or bicalutamide 25–50mg/day).
  route: oral
  population: >-
    Transgender women (assigned male at birth) with androgenic alopecia
    initiating feminizing hormone therapy. Evidence is primarily from
    this population; not studied in cisgender men due to feminizing
    effects being unacceptable in that context.
  mechanism_summary: >-
    Exogenous estradiol suppresses the HPG axis via negative feedback
    on the hypothalamus (reducing GnRH) and pituitary (reducing LH/FSH),
    causing gonadal testosterone production to fall to female physiological
    range (<50 ng/dL vs male range 300–1000 ng/dL). Reduced testosterone
    → reduced 5α-reductase substrate → dramatically reduced scalp DHT →
    cessation of androgenic follicular miniaturisation. In transgender women
    who begin HRT before complete hair loss, stabilisation of AGA and
    partial regrowth (especially at temporal areas) is commonly observed.
    Effect is amplified by co-administration of anti-androgens.

