  dose_description: "Topical application of rendered beef tallow (suet), ad hoc use"
  route: topical
  population: "General adult population with dry or compromised skin barrier; traditional use"
  mechanism_summary: >-
    Beef tallow has a fatty acid profile (oleic acid ~47%, palmitic acid ~26%,
    stearic acid ~14%, conjugated linoleic acid ~2%) closely resembling human
    sebum. These lipids replenish the stratum corneum lipid bilayer, reducing
    transepidermal water loss (TEWL) and restoring barrier function. Oleic
    acid facilitates keratinocyte lipid synthesis; stearic acid and palmitic
    acid are substrates for ceramide production. Conjugated linoleic acid
    has weak anti-inflammatory activity. However, no RCT has measured dermal
    collagen density as an endpoint after topical tallow; the mechanism for
    collagen increase specifically is highly indirect (barrier → reduced
    inflammation → reduced MMP activation). Grade: very_low.

