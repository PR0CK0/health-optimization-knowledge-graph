# EvidenceClaim — Dutasteride increases hair density in AGA (off-label)
---
id: healthkg:claim/dutasteride-increases-hair-density
paradigms: [hair_health]
tags: [dutasteride, hair-density, AGA, rct, off-label]
curator: tyler
curation_date: "2026-02-26"
last_reviewed: "2026-02-26"
overall_grade: high
n_supporting_studies: 2
n_refuting_studies: 0
highest_study_design: randomized_controlled_trial
claim_status: active

assertion:
  subject_agent: CHEBI:521903
  predicate: increases
  object_outcome: healthkg:outcome/hair-density
  dose_description: "0.5mg oral daily (off-label for AGA)"
  population: "Adult males with androgenetic alopecia"
  mechanism_summary: >-
    More complete DHT suppression (97% scalp DHT) than finasteride
    translates to greater hair follicle rescue from androgen-mediated
    miniaturisation, particularly in treatment-resistant or severe AGA.

evidence_lines:

  - study:
      pmid: "20698772"
      title: >-
        The importance of dual 5alpha-reductase inhibition in the treatment
        of male pattern hair loss: results of a randomized placebo-controlled
        study of dutasteride versus finasteride.
      authors: [Olsen EA, Hordinsky M, Whiting D]
      journal: Journal of the American Academy of Dermatology
      year: 2006
      design: randomized_controlled_trial
      n_participants: 416
      duration_weeks: 24
      blinding: double_blind
      risk_of_bias: low
      funding_source: industry_funded
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    notes: >-
      Head-to-head RCT: dutasteride 2.5mg superior to finasteride 5mg
      and finasteride 1mg at 24 weeks for target area hair count.
      Dose-response relationship observed. Dutasteride arm: +109 hairs
      vs finasteride 1mg arm: +75 hairs.

  - study:
      pmid: "28677983"
      title: >-
        A randomized, active- and placebo-controlled study of the efficacy
        and safety of different doses of dutasteride versus placebo and
        finasteride in the treatment of male subjects with androgenetic
        alopecia.
      authors: [Gubelin Harcha W, Barboza Martinez J, Tsai TF]
      journal: Journal of the American Academy of Dermatology
      year: 2014
      design: randomized_controlled_trial
      n_participants: 917
      duration_weeks: 24
      blinding: double_blind
      risk_of_bias: low
      funding_source: industry_funded
    eco_evidence_type: randomized_controlled_trial_evidence
    direction: supports
    notes: >-
      Large RCT (n=917): dutasteride 0.5mg/day produced significantly
      greater increase in target area hair count than finasteride 1mg/day
      at 24 weeks. Both superior to placebo. Adverse event profile
      similar between groups.
