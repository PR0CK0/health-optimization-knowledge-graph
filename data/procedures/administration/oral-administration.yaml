name: Oral Administration
description: >-
  Delivery of a compound via the gastrointestinal tract (swallowed as
  tablet, capsule, liquid, or sublingual). Most common and convenient
  route. Subject to first-pass hepatic metabolism; bioavailability
  varies widely by compound.
